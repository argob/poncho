---
layout: demo
title: "Poncho Map — Puntos digitales"
extra_head: |
    <style>
    @import url("https://www.argentina.gob.ar/profiles/argentinagobar/themes/contrib/poncho/css/icono-arg.css?t9wpy2");
    </style>
    <link rel="stylesheet" href="../dist/css/clusters.css">
---

<div class="container">
    <div class="row">
        <div class="col-md-12">
            <h1 class="h3">Punto Digital</h1>
        </div>
    </div>
</div>

<!--
COPIAR DESDE ACÁ…
-->

<!-- INCLUDE SCRIPTS -->
<script src="https://mapa-ign.argentina.gob.ar/js/leaflet/leaflet.js"></script>
<script src="https://mapa-ign.argentina.gob.ar/js/leaflet/leaflet.markercluster.js"></script>
<link href="https://mapa-ign.argentina.gob.ar/js/leaflet/leaflet.css" rel="stylesheet">
<link href="https://mapa-ign.argentina.gob.ar/js/leaflet/MarkerCluster.css" rel="stylesheet">
<link href="https://mapa-ign.argentina.gob.ar/js/leaflet/MarkerCluster.Default.css" rel="stylesheet">
<script src="./js/template-punto-digital.js"></script>
<!-- / INCLUDE SCRIPTS -->

<div class="container">
<div class="row">

<div class="col-md-12 m-b-1">
<!-- PONCHO SEARCH -->
<search aria-label="Buscar puntos en el mapa">
    <form>
        <div data-scope="search-poncho-map">
            <label class="sr-only" for="search">Buscar ubicación</label>
            <div class="input-group m-b-0 p-b-0 webform-component">
                <input
                    class="js-poncho-map-search__input form-control"
                    id="search"
                    list="js-porcho-map-search__list"
                    name="search"
                    autocomplete="on"
                    spellcheck="true"
                    type="search">
                <datalist
                    class="js-porcho-map-search__list"
                    id="js-porcho-map-search__list">
                </datalist>
                <span class="input-group-btn">
                    <button
                        class="js-poncho-map-search__submit btn btn-primary"
                        type="submit">
                        <i class="fa fa-search text-white"></i>
                        <span class="sr-only">Buscar término</span>
                    </button>
                </span>
            </div>
            <div data-scope="ponchomap">
                <div class="js-poncho-map__help small"></div>
            </div>
        </div>
    </form>
</search>
<!-- / PONCHO SEARCH -->

</div>
<div class="col-md-12">
<!-- PONCHO MAP -->
<div class="poncho-map" data-scope="ponchomap">
    <div
        class="leaflet-container leaflet-touch leaflet-fade-anim leaflet-grab
            leaflet-touch-drag leaflet-touch-zoom"
        id="map"
        style="height:650px;width: 100%;"
        tabindex="0">
    </div>
</div>
<!-- / PONCHO MAP -->
</div>
</div>
</div>

<!-- SHOW CODE -->
<div class="container">
    <div class="row m-y-2">
        <div class="col-md-12">
            <div data-code-from="code_map" data-title="Código para el mapa"></div>
        </div>
    </div>
</div>
<!-- / SHOW CODE -->



<!-- SCRIPTS -->
<script id="code_map">

(async() => {
    const loader = new PonchoMapLoader({scope: "ponchomap"});
    loader.load();

    const url = './data/response.json';
    const jsonData = await fetch_json(url);
    const gdata = Object.values(jsonData.aPDs).flat();
    const iconColor = "text-arg-azul";
    // map options
    const options = {
        debug: true,
        summary: {
            hidden: true,
            title: "Mapa de Puntos Digitales en Argentina",
            position: "top",
            css: "m-y-xs p-y-05 small text-arg-enlace"
        },
        // render_schema:false,
        error_reporting: 0,
        throw_exceptions: 0,
        template: template_punto_digital,
        title:"nombre",
        map_layers: true,
        scope:"ponchomap",
        allowed_tags: ["*"],
        template_markdown: true,
        map_opacity:1,
        latitud: "lat",
        longitud: "long",
        id: "id_pd",
        hash: true,
        slider: true,
        tooltip: true,
        scroll: true,
        marker: (self, ele) => (ele.estado_funcionamiento == "3" ?
                "mandarina" : "azul"),
        header_icons:[
            {
                key: "institucion",
                css: `fa fa-institution ${iconColor}`
            },
            {
                key: "ubicacion",
                css: `fa icono-arg-marcador-ubicacion-2 ${iconColor}`
            },
            {
                key: "email",
                css: `fa fa-envelope ${iconColor}`
            },
            {
                key: "telefono",
                css: `fa icono-arg-telefono-llamada-negativo ${iconColor}`
            },
        ],
        template_structure: {
            values: [
                "estado_funcionamiento_custom",
                "institucion",
                "ubicacion",
                "horarios_custom",
                "telefono",
                "email"
            ],
            mixing: [
                {
                    key: "ubicacion",
                    header: "Ubicación",
                    values: ["calle", "municipio_nombre", "provincia"],
                    separator: ", "
                },
            ]
        },
        headers: {
            telefono: "Teléfono del centro",
            email: "Correo electrónico",
            institucion: "Institución",
            horarios_custom: "",
            estado_funcionamiento_custom: "",
        },
        open_maps: true,
        fit_bounds_after_filter: true,
        filters: [
            {
                legend: "Filtrar por provincia",
                field: ["provincia"],
                fields: false,
                check_uncheck_all: false,
                type: "select",
                label: "Tipo",
                show_label: false,
                show_legend: true,
                all_options_text: "Todas las provincias"
            }
        ],
    };

    // Prepare map
    const map = new PonchoMapFilter(gdata, options);

    // Buscador
    const search_options = {
        scope: "search-poncho-map",
        combobox: true,
        combobox_options: {
            key: false,
            template: ponchoMapTplSearch({
                title: 'name',
                text: ['localidad', 'provincia'],
                separator: ' / '
            })
        },
        text: "nombre",
        search_fields: [
            "nombre",
            "institucion",
            "calle",
            "localidad",
            "provincia",
            "municipio_nombre"
        ],
        id: "id_pd",
        placeholder: "Buscá por nombre, localidad o provincia",
    };
    const mapSearch = new PonchoMapSearch(map, search_options);

    map.render();
    mapSearch.render();

    loader.close();
})();
</script>



<!-- / SCRIPTS -->
