<!-- 
MAPA CON BUSCADOR FILTRO  

COPIAR DESDE ACÁ…
-->
<div class="col-md-12">
<!-- PONCHO MAP SEARCH -->
<form action="" id="poncho-map-search">
    <div data-scope="poncho-map-search">
        <div class="input-group">
            <input 
                type="search" 
                id="search"
                name="search" 
                autocomplete="off"
                class="js-poncho-map-search__input form-control" 
                list="js-porcho-map-search__list">
            <datalist id="js-porcho-map-search__list"></datalist>
            <span class="input-group-btn">
                <button class="js-poncho-map-search__submit btn btn-primary">
                    <i class="fa fa-search text-white"></i>
                </button>
            </span>
        </div>
        <div data-scope="poncho-map" class="m-b-1">
            <div 
                class="js-poncho-map__help small text-default" 
                style="position: relative;">
            </div>
        </div>
    </div>
</form>
<!-- / PONCHO MAP SEARCH -->
</div>
<div class="col-md-12">
<!-- PONCHO MAP -->
<div class="poncho-map" data-scope="poncho-map">
    <div
        class="leaflet-container leaflet-touch leaflet-fade-anim 
               leaflet-grab leaflet-touch-drag leaflet-touch-zoom"
        id="map"
        style="height: 600px; width: 100%;"
        tabindex="0">
    </div>
</div>
<!-- / PONCHO MAP -->
</div>

<!-- INCLUDE SCRIPTS -->
<script src="https://www.argentina.gob.ar/sites/default/files/ponchotable/showdown.js"></script>
<script src="https://www.argentina.gob.ar/profiles/argentinagobar/themes/argentinagobar/argentinagobar_theme/js/extensiones/showdown-extensions.js"></script>
<script src="https://mapa-ign.argentina.gob.ar/js/leaflet/leaflet.js"></script>
<script src="https://mapa-ign.argentina.gob.ar/js/leaflet/leaflet.markercluster.js"></script>
<link href="https://mapa-ign.argentina.gob.ar/js/leaflet/leaflet.css" rel="stylesheet"/> 
<link href="https://mapa-ign.argentina.gob.ar/js/leaflet/MarkerCluster.css" rel="stylesheet"/> 
<link href="https://mapa-ign.argentina.gob.ar/js/leaflet/MarkerCluster.Default.css" rel="stylesheet"/> 
<script src="/profiles/argentinagobar/themes/contrib/poncho/js/poncho.min.js"></script>
<!-- / INCLUDE SCRIPTS -->

<!-- SCRIPTS -->
<script>
// URL WFS (GeoJSON)
var obrasWFS = "https://sigvial.vialidad.gob.ar/geoserver/dnv/ows?" +
    "service=WFS" +
    "&version=1.0.0" +
    "&request=GetFeature" +
    "&typeName=dnv:Obras_Ejecución2026" +
    "&outputFormat=application/json";


// Modifica el color del active
headStyle(
    "vialidad", 
    `.poncho-map path.marker--active {stroke:var(--arg-escarapela);`
    + `filter: none !important;opacity:1 !important;}`
);

// Loader
const loader = new PonchoMapLoader({ scope: "poncho-map", cover_opacity: .3 });
loader.load();

 // init
(async() => {
    // const gdata = await fetch_json( obrasWFS ); 
    const gdata = await fetch_json( "./data/17581-vialidad.json" );

    // Propiedades de polígono
    gdata.features.forEach((entry, i) => {
        const color = "var(--arg-cielo)";
        entry.properties.color = color;
        entry.properties["stroke-color"] = color;
        entry.properties["stroke-opacity"] = 1;
        entry.properties["stroke-width"] = 3;
    });

    // Set headers
    const headers = {
        areas: "Áreas",
        tramo: "Tramo",
        seccion: "Sección",
        user_tramo: "Tramo",
        user_seccion: "Sección",
        km: "Km",
        estado: "Estado",
        obra: "Obra",
        ruta: "Ruta",
        distrito: "Provincia",
        id_registro: "Número de registro",
        id_sigo: "Identificador SIGO",
        cod_ruta: "Código de ruta",
        id_tipo_obra: "id_tipo_obra",
        pkf: "Punto kilométrico final",
        pki: "Punto kilométrico inicial",
        tipo_obra: "Tipo de obra",
    };

    // map options
    const options = {
        summary: {
            title: "Mapa del estado de las obras viales",
            hidden: true
        },
        scope: "poncho-map",
        id: "id",
        title: "obra",
        tooltip: true,
        template_markdown: false,
        theme_map: "dark",
        allowed_tags: false,
        template_structure: {
            values: [
                "distrito",
                "areas",
                "tipo_obra",
                "ruta",
                "tramo",
                "seccion",
                "km",
                "estado",
                "pkf",
                "pki",
                "id_registro",
                "id_sigo",
                "cod_ruta",
            ]
        },
        headers: headers,
        slider: true,
        hash: true,
        fit_bounds_after_filter: true,
        filters: [
            {
                legend : "Filtrar por provincia",
                field: ["distrito", "checked"],
                fields: false,
                type: "select",
                show_label: false,
                check_uncheck_all: false,
                all_options_text: "Todas las provincias"
            },
            {
                legend : "Filtrar por tipo de obra",
                field: ["tipo_obra", "checked"],
                fields: false,
                type: "select",
                show_label: false,
                check_uncheck_all: true,
            },
        ],
    };

    // render map
    const pm = new PonchoMapFilter(gdata, options);
    
    // Buscador
    const searchOptions = {
        scope: "poncho-map-search", 
        combobox: true,
        placeholder: "Buscar por nombre de obra, ruta, id SIGO o provincia",
        search_fields: [
            "tramo", 
            "seccion", 
            "area", 
            "obra", 
            "distrito",
            "ruta",
            "id_registro",
            "id_sigo",
        ] 
    };
    const pmSearch = new PonchoMapSearch(pm, searchOptions);
    pm.render();
    pmSearch.render();
    loader.close();
})();
</script>
<!-- / SCRIPTS -->
</body>
</html>
